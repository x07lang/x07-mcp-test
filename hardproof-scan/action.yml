name: Hardproof Scan (beta)
description: Run Hardproof verification in GitHub Actions using a release binary.

inputs:
  url:
    description: "MCP server base URL (example: http://127.0.0.1:3000/mcp)"
    required: false
    default: ""
  cmd:
    description: "MCP stdio command (example: ./server)"
    required: false
    default: ""
  cwd:
    description: Working directory for cmd (optional)
    required: false
    default: ""
  env-file:
    description: Env file to load for cmd (optional)
    required: false
    default: ""
  full-suite:
    description: Run the full conformance suite (default false)
    required: false
    default: "false"
  baseline:
    description: Path to a conformance expected-failures YAML file (optional)
    required: false
    default: ""
  sarif:
    description: Emit a SARIF report file (default false)
    required: false
    default: "false"
  threshold:
    description: Minimum score (0-100) required to pass (default 80)
    required: false
    default: "80"
  version:
    description: "Hardproof release tag (example: v0.3.0-beta.0) or latest-beta"
    required: false
    default: latest-beta

outputs:
  scan_ok:
    description: "true if scan passed (exit 0)"
    value: ${{ steps.scan.outputs.ok }}
  report_json:
    description: Path to scan report JSON (`scan.json`)
    value: ${{ steps.scan.outputs.report_json }}
  report_junit:
    description: Path to conformance JUnit XML report (`conformance.summary.junit.xml`)
    value: ${{ steps.scan.outputs.report_junit }}
  report_html:
    description: Path to HTML scan report (`report.html`)
    value: ${{ steps.scan.outputs.report_html }}
  report_sarif:
    description: Path to SARIF report (when enabled)
    value: ${{ steps.scan.outputs.report_sarif }}
  ok:
    description: "compat alias for scan_ok"
    value: ${{ steps.scan.outputs.ok }}
  json_report:
    description: "compat alias for report_json"
    value: ${{ steps.scan.outputs.report_json }}
  junit_report:
    description: "compat alias for report_junit"
    value: ${{ steps.scan.outputs.report_junit }}
  html_report:
    description: "compat alias for report_html"
    value: ${{ steps.scan.outputs.report_html }}
  sarif_report:
    description: "compat alias for report_sarif"
    value: ${{ steps.scan.outputs.report_sarif }}

runs:
  using: composite
  steps:
    - name: Install hardproof (release binary)
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/hardproof/bin"
        mkdir -p "${install_dir}"
        bash "${GITHUB_ACTION_PATH}/../scripts/install.sh" \
          --tag "${{ inputs.version }}" \
          --install-dir "${install_dir}"
        echo "${install_dir}" >>"${GITHUB_PATH}"
        echo "HARDPROOF_BIN=${install_dir}/hardproof" >>"${GITHUB_ENV}"
        "${install_dir}/hardproof" --help >/dev/null

    - name: Doctor (environment diagnostics)
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p out
        "${HARDPROOF_BIN}" doctor --machine json > out/doctor.json

    - name: Validate inputs
      shell: bash
      env:
        HARDPROOF_ACTION_URL: ${{ inputs.url }}
        HARDPROOF_ACTION_CMD: ${{ inputs.cmd }}
        HARDPROOF_ACTION_FULL_SUITE: ${{ inputs.full-suite }}
        HARDPROOF_ACTION_SARIF: ${{ inputs.sarif }}
        HARDPROOF_ACTION_THRESHOLD: ${{ inputs.threshold }}
      run: |
        set -euo pipefail
        bash "${GITHUB_ACTION_PATH}/../action/validate_inputs.sh"

    - name: Hardproof CI
      id: scan
      shell: bash
      run: |
        set -euo pipefail

        out_dir="out/scan"
        rm -rf "${out_dir}"
        mkdir -p "${out_dir}"

        url="${{ inputs.url }}"
        cmd="${{ inputs.cmd }}"
        cwd="${{ inputs.cwd }}"
        env_file="${{ inputs.env-file }}"

        args=(ci --out "${out_dir}" --machine json --threshold "${{ inputs.threshold }}")
        if [[ -n "${url}" ]]; then
          args+=(--url "${url}")
        fi
        if [[ -n "${cmd}" ]]; then
          args+=(--cmd "${cmd}")
        fi
        if [[ -n "${cwd}" ]]; then
          args+=(--cwd "${cwd}")
        fi
        if [[ -n "${env_file}" ]]; then
          args+=(--env-file "${env_file}")
        fi
        if [[ "${{ inputs.full-suite }}" == "true" ]]; then
          args+=(--full-suite)
        fi
        if [[ -n "${{ inputs.baseline }}" ]]; then
          args+=(--baseline "${{ inputs.baseline }}")
        fi
        set +e
        "${HARDPROOF_BIN}" "${args[@]}" >"${out_dir}/ci.stdout.json"
        exit_code="$?"
        set -e

        ok="false"
        if [[ "${exit_code}" == "0" ]]; then
          ok="true"
        fi

        echo "ok=${ok}" >>"${GITHUB_OUTPUT}"
        echo "report_json=${out_dir}/scan.json" >>"${GITHUB_OUTPUT}"
        echo "report_junit=${out_dir}/conformance.summary.junit.xml" >>"${GITHUB_OUTPUT}"
        echo "report_html=${out_dir}/report.html" >>"${GITHUB_OUTPUT}"

        if [[ ! -s "${out_dir}/scan.json" ]]; then
          echo "ERROR: missing scan report: ${out_dir}/scan.json" >&2
          exit 2
        fi
        if [[ ! -s "${out_dir}/scan.events.jsonl" ]]; then
          echo "ERROR: missing scan events: ${out_dir}/scan.events.jsonl" >&2
          exit 2
        fi
        if [[ ! -s "${out_dir}/conformance.summary.json" ]]; then
          echo "ERROR: missing conformance summary: ${out_dir}/conformance.summary.json" >&2
          exit 2
        fi
        if [[ ! -s "${out_dir}/conformance.summary.junit.xml" ]]; then
          echo "ERROR: missing conformance JUnit: ${out_dir}/conformance.summary.junit.xml" >&2
          exit 2
        fi
        if [[ ! -s "${out_dir}/conformance.summary.html" ]]; then
          echo "ERROR: missing conformance HTML: ${out_dir}/conformance.summary.html" >&2
          exit 2
        fi
        if [[ ! -s "${out_dir}/conformance.summary.sarif.json" ]]; then
          echo "ERROR: missing conformance SARIF: ${out_dir}/conformance.summary.sarif.json" >&2
          exit 2
        fi

        "${HARDPROOF_BIN}" report html --input "${out_dir}/scan.json" > "${out_dir}/report.html"
        if [[ ! -s "${out_dir}/report.html" ]]; then
          echo "ERROR: missing HTML report: ${out_dir}/report.html" >&2
          exit 2
        fi

        sarif_report=""
        if [[ "${{ inputs.sarif }}" == "true" ]]; then
          sarif_report="${out_dir}/report.sarif.json"
          "${HARDPROOF_BIN}" report sarif --input "${out_dir}/scan.json" > "${sarif_report}"
          if [[ ! -s "${sarif_report}" ]]; then
            echo "ERROR: missing SARIF report: ${sarif_report}" >&2
            exit 2
          fi
        fi
        echo "report_sarif=${sarif_report}" >>"${GITHUB_OUTPUT}"

        if [[ "${exit_code}" == "2" ]]; then
          echo "ERROR: scan failed due to invocation/config/runtime precondition (exit 2)." >&2
          exit 2
        fi

        if [[ "${exit_code}" == "1" ]]; then
          echo "ERROR: scan failed or score fell below threshold (exit 1)." >&2
          exit 1
        fi
