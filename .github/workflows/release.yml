name: Release (alpha skeleton)

on:
  push:
    tags:
      - "v0.1.*-alpha*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build artifacts for (example: v0.1.0-alpha.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  X07_TOOLCHAIN_TAG: "v0.1.107"

jobs:
  build:
    name: release / build (${{ matrix.platform }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runs_on: ubuntu-latest
          - platform: darwin-arm64
            runs_on: macos-latest
          - platform: darwin-x64
            runs_on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev
          cc --version

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          if command -v brew >/dev/null 2>&1; then
            brew install openssl@3 pkg-config
          fi

          if ! command -v cc >/dev/null 2>&1; then
            echo "ERROR: missing C compiler required for x07 bundle (expected cc on PATH)" >&2
            exit 1
          fi
          cc --version

      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}

      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh

      - name: Build release artifact
        shell: bash
        env:
          X07_MCP_TEST_TAG: ${{ inputs.tag || github.ref_name }}
        run: ./scripts/ci/build_release_binaries.sh

      - name: Smoke release archive
        shell: bash
        run: |
          set -euo pipefail
          archive="$(ls -1 dist/x07-mcp-test-*.tar.gz | head -n 1)"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT
          tar -xzf "${archive}" -C "${tmp_dir}"
          "${tmp_dir}/x07-mcp-test" --help >/dev/null
          "${tmp_dir}/x07-mcp-test" doctor --help >/dev/null
          "${tmp_dir}/x07-mcp-test" conformance run --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x07-mcp-test-${{ inputs.tag || github.ref_name }}-${{ matrix.platform }}
          path: dist/x07-mcp-test-*.tar.gz

  checksums:
    name: release / checksums + install script
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find dist -type f -name 'x07-mcp-test-*.tar.gz' -print0 | xargs -0 -I{} cp "{}" upload/
          cd upload
          sha256sum x07-mcp-test-*.tar.gz | LC_ALL=C sort > checksums.txt
          cat checksums.txt

      - name: Add install script
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/install.sh upload/install.sh

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: x07-mcp-test-${{ inputs.tag || github.ref_name }}-release-assets
          path: upload/

  publish:
    name: release / publish (prerelease)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: x07-mcp-test-${{ github.ref_name }}-release-assets
          path: upload

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          files: |
            upload/x07-mcp-test-*.tar.gz
            upload/checksums.txt
            upload/install.sh
          body: |
            Private alpha release for `x07-mcp-test` (M1).

            What works:
            - `doctor`
            - `conformance run` (official MCP conformance via `npx`)
            - `replay record` / `replay verify` (HTTP cassette)
            - `trust verify`
            - `bundle verify`

            Install:
            - Download the `x07-mcp-test-...tar.gz` for your OS/arch + verify via `checksums.txt`, or run:
              - `curl -fsSL https://github.com/x07lang/x07-mcp-test/releases/download/${{ github.ref_name }}/install.sh | bash -s -- --tag ${{ github.ref_name }}`

            Known limitations:
            - Windows support is via WSL2 (use the `linux-x64` artifact inside WSL2).
            - Conformance requires Node/npm/npx on PATH.
