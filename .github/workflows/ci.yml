name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  X07_TOOLCHAIN_TAG: "v0.1.107"

jobs:
  check:
    name: ci / check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev
          cc --version
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: fixtures/servers/package-lock.json
      - name: Cache X07 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.x07
          key: x07-${{ runner.os }}-${{ env.X07_TOOLCHAIN_TAG }}
      - name: Install X07 (pinned)
        shell: bash
        run: ./scripts/ci/install_x07_toolchain.sh
      - name: Check
        shell: bash
        run: ./scripts/ci/check_all.sh
